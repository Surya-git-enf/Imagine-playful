<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Playful — Turn Words Into Worlds</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; font-family: 'Inter', sans-serif; color: #ffffff; height: 400vh; overflow-x: hidden; }

    #webgl-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; outline: none; }

    #ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1000px; }

    #scroll-hint { position: absolute; bottom: 40px; font-family: 'Space Mono', monospace; font-size: 0.8rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; animation: bounce 2s infinite; }

    .top-nav { position: absolute; top: 30px; right: 40px; width: 100%; display: flex; justify-content: flex-end; pointer-events: auto; opacity: 0; transform: translateY(-20px); }
    .sign-in-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 24px; border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); }
    .sign-in-btn:hover { background: rgba(255,255,255,0.1); border-color: white; }

    /* Baby Blue & Black Premium Glassmorphism */
    #prompt-box {
        position: absolute; top: 12%; width: 90%; max-width: 500px;
        background: linear-gradient(135deg, rgba(137, 207, 240, 0.15) 0%, rgba(0, 0, 0, 0.8) 100%);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(137, 207, 240, 0.3); 
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(137, 207, 240, 0.1);
        border-radius: 16px; padding: 30px;
    }
    #typewriter { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 400; line-height: 1.6; color: #f8fafc; }
    .cursor { display: inline-block; width: 6px; height: 1rem; background: #89CFF0; margin-left: 5px; animation: blink 1s infinite; vertical-align: text-bottom; }

    /* Holographic Video Screen */
    #holo-screen {
        position: absolute; top: 15%; width: 90%; max-width: 600px; aspect-ratio: 16/9;
        background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(137, 207, 240, 0.4);
        box-shadow: 0 0 40px rgba(137, 207, 240, 0.3); border-radius: 12px; overflow: hidden;
        opacity: 0; transform: scale(0.5) translateY(100px); display: flex; justify-content: center; align-items: center;
    }
    #holo-screen video { width: 100%; height: 100%; object-fit: cover; opacity: 0.95; mix-blend-mode: screen; }

    /* Bottom UI */
    #bottom-ui { position: absolute; bottom: 8%; text-align: center; width: 100%; opacity: 0; transform: translateY(40px); pointer-events: auto; }
    .logo-text { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 700; letter-spacing: -2px; margin-bottom: -5px; }
    .serif-accent { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-size: clamp(2rem, 4vw, 3.5rem); color: #e2e8f0; margin-bottom: 30px; }
    .build-btn {
        background: linear-gradient(135deg, #1e3a8a 0%, #020617 100%); color: white; border: 1px solid rgba(59, 130, 246, 0.3); 
        padding: 18px 55px; border-radius: 50px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1.1rem; 
        cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(30, 58, 138, 0.3);
    }
    .build-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(30, 58, 138, 0.5); border-color: rgba(59, 130, 246, 0.6); }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
</style>
</head>
<body>

<canvas id="webgl-canvas"></canvas>

<div id="ui-layer">
    <div id="scroll-hint">Scroll Down</div>
    <div class="top-nav"><button class="sign-in-btn">Sign In</button></div>

    <div id="prompt-box">
        <span id="typewriter"></span><span class="cursor" id="cursor"></span>
    </div>

    <div id="holo-screen">
        <video id="game-vid" src="./gemini_generated_video_36f7ddcd.mp4" playsinline muted loop></video>
    </div>

    <div id="bottom-ui">
        <div class="logo-text">Playful</div>
        <div class="serif-accent">turns words into worlds</div>
        <button class="build-btn">Build Now</button>
    </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

// 1. THREE.JS SETUP
const canvas = document.getElementById('webgl-canvas');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 12); camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Drama Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); scene.add(ambientLight);
const spotLight = new THREE.SpotLight(0x89CFF0, 5); 
spotLight.position.set(0, 8, 4); spotLight.angle = Math.PI / 5; spotLight.penumbra = 0.5;
scene.add(spotLight);

// 2. THE CONTROLLER & BEAM
let controllerGroup = new THREE.Group();
scene.add(controllerGroup);

const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.3 });

// Instagram Gradient Material Generator
const gradCanvas = document.createElement('canvas'); gradCanvas.width = 512; gradCanvas.height = 512;
const ctx = gradCanvas.getContext('2d');
const grad = ctx.createLinearGradient(0, 0, 512, 512);
grad.addColorStop(0, "#4f46e5"); grad.addColorStop(0.3, "#a855f7"); grad.addColorStop(0.6, "#ec4899"); grad.addColorStop(1, "#f97316");
ctx.fillStyle = grad; ctx.fillRect(0,0,512,512);
const gradientTex = new THREE.CanvasTexture(gradCanvas);
const gradientMat = new THREE.MeshStandardMaterial({ map: gradientTex, roughness: 0.1, metalness: 0.3, emissive: 0x4f46e5, emissiveIntensity: 0.2 });

controllerGroup.position.y = -1;

// ⚠️ INJECTING YOUR 6MB PS5 CONTROLLER .GLB ⚠️
const loader = new THREE.GLTFLoader();
loader.load('./ps5_controller.glb', function(gltf) {
    const model = gltf.scene;
    model.traverse((child) => { 
        if (child.isMesh) { 
            child.material = whiteMat; // Sets it to white plastic initially
            child.name = "body"; // Tags it for the GSAP color swap!
        } 
    });
    model.scale.set(1.5, 1.5, 1.5); // Adjust this if controller looks too big/small
    controllerGroup.add(model);
});

// Hologram Beam
const beamGeo = new THREE.CylinderGeometry(3.5, 0.2, 5, 32, 1, true); 
const beamMat = new THREE.MeshBasicMaterial({ color: 0x89CFF0, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
const holoBeam = new THREE.Mesh(beamGeo, beamMat);
holoBeam.position.set(0, 2.5, 0); 
controllerGroup.add(holoBeam);

// 3. MASTER SCROLL TIMELINE
const tl = gsap.timeline({ scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 1.5 } });

tl.to("#scroll-hint", { opacity: 0, duration: 0.5 }, 0);

// Typing Text
const fullText = "Create a 3D space shooter game with first-person view. Enemies attack in waves. I use lasers.";
const textObj = { val: 0 };
tl.to(textObj, {
    val: fullText.length, duration: 3,
    onUpdate: () => { document.getElementById("typewriter").innerText = fullText.substring(0, Math.floor(textObj.val)); }
}, 0);

// Controller Spin & Textbox disappear
tl.to(controllerGroup.rotation, { y: Math.PI, duration: 3 }, 4);
tl.to("#prompt-box", { rotationY: 360, opacity: 0, scale: 0.8, duration: 3 }, 4);

// 90 DEGREE COLOR SWAP (Turns into Playful Logo!)
tl.call(() => {
    controllerGroup.children.forEach(child => {
        if(child.name === "body" && child.material !== gradientMat) child.material = gradientMat;
    });
}, null, 5.5); 
tl.call(() => {
    controllerGroup.children.forEach(child => {
        if(child.name === "body" && child.material !== whiteMat) child.material = whiteMat;
    });
}, null, 5.4); 

// Hologram Video Appears
tl.call(() => document.getElementById("game-vid").play(), null, 5.5);
tl.to("#holo-screen", { opacity: 1, scale: 1, y: 0, duration: 2 }, 5.5);
tl.to(beamMat, { opacity: 0.4, duration: 2 }, 5.5); 

// Hologram IMMERSES into controller
tl.to("#holo-screen", { scale: 0, y: 150, opacity: 0, duration: 2, ease: "power2.in" }, 8.5);
tl.to(beamMat, { opacity: 0, duration: 1.5, ease: "power2.in" }, 8.5);

// Cinematic Zoom Out & UI Reveal
tl.to(camera.position, { y: 6, z: 16, duration: 2.5, ease: "power2.inOut" }, 10.5);
tl.to(controllerGroup.rotation, { x: Math.PI / 4, duration: 2.5, ease: "power2.inOut" }, 10.5);
tl.to("#bottom-ui", { opacity: 1, y: 0, duration: 2 }, 11.5);
tl.to(".top-nav", { opacity: 1, y: 0, duration: 2 }, 11.5);

// Render Loop
function animate() {
    requestAnimationFrame(animate);
    controllerGroup.position.y = -1 + Math.sin(Date.now() * 0.002) * 0.1;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
