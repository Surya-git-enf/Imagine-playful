<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Playful — Turn Words Into Worlds</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Instrument+Serif:ital@1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js" crossorigin="anonymous"></script>

<style>
/* ═══════════════════════════════════════════════════
   RESET + TOKENS
═══════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:auto;}

:root{
  --neon-blue:#00b4ff;
  --neon-cyan:#00eaff;
  --neon-deep:#0044ff;
  --dark:     #020510;
}

body{
  background:var(--dark);
  font-family:'Space Mono',monospace;
  color:#fff;
  height:560vh; /* Scroll height */
  overflow-x:hidden;
  cursor:crosshair;
}

/* grain */
body::after{
  content:'';position:fixed;inset:0;z-index:900;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.025;mix-blend-mode:overlay;
}

/* vignette */
.vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 85% 75% at 50% 50%,transparent 35%,rgba(0,0,18,.78) 100%);
}

/* canvas */
#webgl-canvas{position:fixed;inset:0;width:100vw;height:100vh;z-index:1;display:block;outline:none;}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* ═══════════════════════════════════════════════════
   LOADING SCREEN 
═══════════════════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:8000;
  background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(0,20,60,.9) 0%,var(--dark) 65%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .9s cubic-bezier(.4,0,.2,1);
}
#loader.out{opacity:0;pointer-events:none;}

.loader-ring-wrap{ position:relative; width:160px; height:160px; margin-bottom:28px; display:flex; align-items:center; justify-content:center; }
.loader-ring{ position:absolute; inset:0; border-radius:50%; border:2px solid transparent; background: linear-gradient(var(--dark),var(--dark)) padding-box, conic-gradient(from 0deg,transparent 0%,var(--neon-cyan) 35%,var(--neon-blue) 60%,transparent 100%) border-box; animation:spinRing 1.4s linear infinite; }
@keyframes spinRing{to{transform:rotate(360deg);}}
.loader-ring2{ position:absolute; inset:10px; border-radius:50%; border:1.5px solid transparent; background: linear-gradient(var(--dark),var(--dark)) padding-box, conic-gradient(from 180deg,transparent 0%,rgba(0,180,255,.5) 40%,transparent 100%) border-box; animation:spinRing 2.2s linear infinite reverse; }

.loader-logo{
  font-family:'Orbitron',sans-serif;font-weight:900; font-size:clamp(2rem,4vw,3rem);letter-spacing:.25em;
  background:linear-gradient(90deg,#fff 0%,var(--neon-cyan) 40%,var(--neon-blue) 70%,#fff 100%); background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; animation:logoShift 3s linear infinite; margin-bottom:8px;
}
@keyframes logoShift{0%{background-position:0%;}100%{background-position:300%;}}

.loader-tag{ font-family:'Space Mono',monospace;font-size:.6rem; letter-spacing:.4em;color:rgba(0,180,255,.5); text-transform:uppercase;margin-bottom:20px; }
.loader-bar-track{ width:220px;height:1.5px; background:rgba(0,120,255,.12);border-radius:2px;overflow:hidden; }
.loader-bar-fill{ height:100%;width:0%; background:linear-gradient(90deg,var(--neon-deep),var(--neon-cyan)); border-radius:2px; box-shadow:0 0 8px var(--neon-cyan); animation:barFill 1.8s cubic-bezier(.4,0,.2,1) infinite; }
@keyframes barFill{0%{width:0%;}50%{width:100%;}100%{width:0%;}}

/* ═══════════════════════════════════════════════════
   NAV & UI
═══════════════════════════════════════════════════ */
.top-nav{ position:absolute;top:0;left:0;right:0; padding:18px 44px; display:flex;justify-content:space-between;align-items:center; pointer-events:auto; background:linear-gradient(to bottom,rgba(0,0,20,.7) 0%,transparent 100%); backdrop-filter:blur(10px); opacity:1; }
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-name{ font-family:'Orbitron',sans-serif;font-weight:900; font-size:1.22rem;letter-spacing:.22em; background:linear-gradient(90deg,#fff 0%,#a855f7 22%,#38bdf8 44%,#fb923c 66%,#fff 100%); background-size:280%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; animation:navGrad 4s linear infinite; }
@keyframes navGrad{0%{background-position:0%;}100%{background-position:280%;}}

.nav-right{display:flex;gap:9px;align-items:center;}
.nav-btn{ padding:8px 20px;border-radius:99px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04);backdrop-filter:blur(12px); color:rgba(255,255,255,.7);font-family:'Space Mono',monospace; font-size:.7rem;font-weight:700;letter-spacing:.06em; cursor:pointer;transition:all .26s;text-decoration:none;display:inline-block; }
.nav-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);color:#fff;}
.nav-auth{ display:flex;gap:9px; opacity:0;transform:translateY(-10px); transition:opacity .6s,transform .6s; pointer-events:none; }
.nav-auth.show{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-btn.signup{ background:linear-gradient(135deg,rgba(0,80,220,.55),rgba(0,160,255,.38)); border-color:rgba(0,180,255,.5);color:#7dd6ff; box-shadow:0 0 16px rgba(0,120,255,.25); }

/* PROMPT BOX */
#prompt-box{
  position:absolute; top:8vh;left:50%; transform:translateX(-50%); width:460px; opacity:0;
  border-radius:18px; padding:1.5px; background:linear-gradient(135deg,#00aaff,#0033ff,#00eeff,#0066ff);
  background-size:300%; animation:pbBorder 3s ease infinite; box-shadow: 0 0 40px rgba(0,140,255,.45), 0 0 80px rgba(0,80,255,.25);
  will-change:opacity,transform;
}
@keyframes pbBorder{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.pb-inner{ border-radius:17px; padding:22px 26px 20px; background:rgba(0,4,20,.88); backdrop-filter:blur(36px); position:relative;overflow:hidden; }

#typewriter{ font-family:'Space Mono',monospace; font-size:.88rem;font-weight:400;line-height:1.82; color:rgba(180,220,255,.92); letter-spacing:.01em;display:block; position:relative;z-index:1;min-height:1.6em; }
.tc{ display:inline-block;width:2px;height:1.05em; background:linear-gradient(to bottom,var(--neon-cyan),var(--neon-deep)); margin-left:2px;vertical-align:text-bottom; animation:blink 1.1s step-end infinite; }
@keyframes blink{50%{opacity:0;}}

/* SCROLL HINT */
#scroll-hint{ position:absolute;bottom:26px;left:50%; transform:translateX(-50%); display:flex;flex-direction:column;align-items:center;gap:9px; animation:shFloat 2.2s ease-in-out infinite; }
.sh-mouse{width:22px;height:34px;border:1.5px solid rgba(0,180,255,.35);border-radius:11px;display:flex;justify-content:center;padding-top:6px;}
.sh-dot{width:3px;height:6px;border-radius:2px;background:rgba(0,180,255,.72);animation:shDot 2.2s ease-in-out infinite;}
@keyframes shDot{0%,100%{transform:translateY(0);opacity:1;}60%{transform:translateY(8px);opacity:0;}80%{opacity:1;}}
.sh-txt{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.34em;color:rgba(0,180,255,.35);text-transform:uppercase;}
@keyframes shFloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}

#phase-lbl{ position:absolute;bottom:22px;right:28px; font-family:'Space Mono',monospace;font-size:.46rem; letter-spacing:.22em;color:rgba(0,160,255,.18);pointer-events:none; }

/* BOTTOM HERO UI */
#bottom-ui{ position:absolute;bottom:5%;left:0;right:0; text-align:center;opacity:0;transform:translateY(36px); pointer-events:auto;padding:0 24px; }
.hero-logo{ font-family:'Orbitron',sans-serif;font-weight:900; font-size:clamp(3rem,5.5vw,5.5rem); letter-spacing:.08em;line-height:1;margin-bottom:8px; background:linear-gradient(90deg, #fff 0%,#a855f7 18%,#38bdf8 36%,#fb923c 54%,#ec4899 72%,#a855f7 88%,#fff 100%); background-size:260%; -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; animation:logoGrad 5s linear infinite; filter:drop-shadow(0 0 35px rgba(0,180,255,.22)); }
@keyframes logoGrad{0%{background-position:0%;}100%{background-position:260%;}}
.hero-tagline{ font-family:'Instrument Serif',serif;font-style:italic; font-size:clamp(1.1rem,2.2vw,1.9rem); color:rgba(200,220,255,.6);letter-spacing:.015em;margin-bottom:24px; }
.build-btn{ position:relative;overflow:hidden; display:inline-flex;align-items:center;gap:10px; padding:16px 60px;border-radius:99px;border:none;cursor:pointer; font-family:'Orbitron',sans-serif;font-weight:900; font-size:.9rem;letter-spacing:.22em;text-transform:uppercase;color:#fff; background:linear-gradient(135deg,#1a1572,#4f46e5,#a855f7,#ec4899,#f97316); background-size:300%;animation:btnGrad 4s ease infinite; box-shadow:0 0 55px rgba(79,70,229,.52),0 0 110px rgba(168,85,247,.2); transition:transform .3s,box-shadow .3s;text-decoration:none; }
.build-btn:hover{transform:translateY(-5px) scale(1.06);box-shadow:0 0 85px rgba(79,70,229,.7),0 20px 50px rgba(0,0,0,.6);}
@keyframes btnGrad{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring-wrap">
    <div class="loader-ring"></div>
    <div class="loader-ring2"></div>
  </div>
  <h1 class="loader-logo">PLAYFUL</h1>
  <p class="loader-tag">Downloading 3D Assets...</p>
  <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
</div>

<div class="vignette"></div>
<canvas id="webgl-canvas"></canvas>

<div id="ui-layer">
  <div id="scroll-hint">
    <div class="sh-mouse"><div class="sh-dot"></div></div>
    <span class="sh-txt">scroll</span>
  </div>
  <div id="phase-lbl">—</div>

  <nav class="top-nav">
    <a href="#" class="nav-brand"><span class="nav-name">PLAYFUL</span></a>
    <div class="nav-right">
      <div class="nav-auth" id="nav-auth">
        <a href="#" class="nav-btn signin">Sign In</a>
        <a href="#" class="nav-btn signup">Sign Up →</a>
      </div>
    </div>
  </nav>

  <div id="prompt-box">
    <div class="pb-inner">
      <span id="typewriter"></span><span class="tc"></span>
    </div>
  </div>

  <div id="bottom-ui">
    <h1 class="hero-logo">PLAYFUL</h1>
    <p class="hero-tagline">Turn words into worlds</p>
    <a href="#" class="build-btn"><span>✦</span> Build Now</a>
  </div>
</div>

<script>
(function(){
'use strict';

function waitFor(fn,cb,n){ n=n||0; if(fn()){cb();return;} if(n>200)return; setTimeout(function(){waitFor(fn,cb,n+1);},80); }
waitFor(function(){return window.THREE&&window.gsap&&window.ScrollTrigger;}, main);

function main(){
  gsap.registerPlugin(ScrollTrigger);
  var PI=Math.PI;

  /* ── RENDERER ── */
  var cv=document.getElementById('webgl-canvas');
  var renderer=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.15;

  /* ── SCENE ── */
  var scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x020814,0.01);

  /* ── CAMERA ── */
  var camera=new THREE.PerspectiveCamera(40,window.innerWidth/window.innerHeight,0.1,300);
  camera.position.set(0,2,22);
  camera.lookAt(0,0,0);
  var lookY=0; 

  /* ── LIGHTS ── */
  scene.add(new THREE.AmbientLight(0x020818,2.2));
  var kL=new THREE.SpotLight(0x89CFF0,10); kL.position.set(0,9,6); kL.angle=PI/5; kL.penumbra=.55; kL.decay=1.8; scene.add(kL); scene.add(kL.target);
  var rL=new THREE.PointLight(0x7c3aed,7,22); rL.position.set(-5,4,-5); scene.add(rL);
  var fL=new THREE.PointLight(0xff5500,4,18); fL.position.set(6,-2,4); scene.add(fL);

  /* ── PLAYFUL GRADIENT MATERIAL (Created via Canvas) ── */
  var gCv=document.createElement('canvas'); gCv.width=gCv.height=512;
  var gCtx=gCv.getContext('2d');
  var grd=gCtx.createLinearGradient(0,0,512,512);
  grd.addColorStop(0,'#1a0a4a'); grd.addColorStop(.2,'#4f46e5'); grd.addColorStop(.42,'#a855f7'); grd.addColorStop(.62,'#22d3ee'); grd.addColorStop(.8,'#ec4899'); grd.addColorStop(1,'#f97316');
  gCtx.fillStyle=grd; gCtx.fillRect(0,0,512,512);
  var mGrad=new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(gCv), metalness:.45, roughness:.08, emissive:new THREE.Color(0x2a1560), emissiveIntensity:.75});

  /* ── JOYSTICK GROUP ── */
  var ctrl=new THREE.Group(); ctrl.position.y=-0.5; scene.add(ctrl);
  var controllerModel;

  /* ── HOLOGRAM PROJECTOR BEAM ── */
  var bMat=new THREE.MeshBasicMaterial({color:0x0066ff,transparent:true,opacity:0,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
  var bMesh=new THREE.Mesh(new THREE.CylinderGeometry(2.8,.06,7,38,1,true),bMat); bMesh.position.set(0,3.5,0); scene.add(bMesh);
  var bcMat=new THREE.MeshBasicMaterial({color:0x44ccff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
  var bcMesh=new THREE.Mesh(new THREE.CylinderGeometry(.55,.018,7,20,1,true),bcMat); bcMesh.position.set(0,3.5,0); scene.add(bcMesh);

  /* ── 📺 HOLOGRAM VIDEO SCREEN ── */
  var holoG=new THREE.Group(); holoG.position.set(0,6.6,0); holoG.rotation.x=-.1; holoG.scale.setScalar(0); scene.add(holoG);

  var video = document.createElement('video');
  video.src = "gemini_generated_video_36f7ddcd.mp4"; // YOUR MP4 VIDEO HERE
  video.crossOrigin = "anonymous";
  video.loop = true;
  video.muted = true;
  video.playsInline = true;

  var videoTex = new THREE.VideoTexture(video);
  videoTex.minFilter = THREE.LinearFilter; videoTex.magFilter = THREE.LinearFilter;

  // Screen Plane
  var holoScreen = new THREE.Mesh(
    new THREE.PlaneGeometry(6.4, 3.6), 
    new THREE.MeshBasicMaterial({map: videoTex, transparent: true, opacity: 0.95, side: THREE.DoubleSide, depthWrite: false})
  );
  holoG.add(holoScreen);

  /* Neon Frame */
  var fEdges=[ {w:6.5,h:.03,x:0,y: 1.85,c:0x00eaff}, {w:6.5,h:.03,x:0,y:-1.85,c:0x0088ff}, {w:.03,h:3.7, x:-3.25,y:0,c:0x0055ff}, {w:.03,h:3.7, x: 3.25,y:0,c:0x00aaff} ];
  fEdges.forEach(function(f){
    var m=new THREE.Mesh(new THREE.BoxGeometry(f.w,f.h,.04),new THREE.MeshBasicMaterial({color:f.c}));
    m.position.set(f.x,f.y,.02); holoG.add(m);
  });

  /* ── LOAD THE 3D GLB MODEL ── */
  var loader = new THREE.GLTFLoader();
  loader.load('ps5_controller.glb', function(gltf) {
      controllerModel = gltf.scene;
      controllerModel.scale.set(12, 12, 12); // Adjust if necessary based on your file
      controllerModel.position.set(0, 0, 0);

      // Save original materials so we can swap them!
      controllerModel.traverse(function(child) {
          if(child.isMesh) {
              child.userData.origMat = child.material;
          }
      });

      ctrl.add(controllerModel);

      // Hide Loader & Start Sequence
      var loadDiv = document.getElementById('loader');
      loadDiv.classList.add('out');
      setTimeout(function(){
          loadDiv.style.display = 'none';
          document.getElementById('nav').classList.add('show');
          startSequence();
      }, 950);
  });

  /* ── ANIMATION STATE ── */
  var phase='idle', floatJoy=true;
  function setLabel(t){ document.getElementById('phase-lbl').textContent=t.toUpperCase().replace('_',' ')+'_'; }

  /* ── GSAP SCROLL TIMELINE ── */
  var tl;
  function startSequence() {
      tl = gsap.timeline({ scrollTrigger:{trigger:'body',start:'top top',end:'bottom bottom',scrub:1.8} });

      tl.to('#scroll-hint',{opacity:0,duration:.4},0);
      tl.to('#prompt-box',{opacity:1,duration:.8,ease:'power2.out'},0);

      // Typing
      var PROMPT='Create a space shooter game with first-person view. Enemies attack in waves. I destroy them with plasma lasers.';
      var typer={v:0};
      tl.to(typer,{
        v:PROMPT.length,duration:3,ease:'none',
        onUpdate:function(){document.getElementById('typewriter').textContent=PROMPT.substring(0,Math.round(typer.v));}
      },0.8);

      // SYNCHRONIZED SPIN (Controller 360, Prompt Box 180)
      tl.to(ctrl.rotation,  {y:PI*2,duration:3,ease:'power1.inOut'},4.0);
      tl.to('#prompt-box',  {rotationY:180,opacity:0,scale:.88,duration:3,ease:'power1.inOut'},4.0);

      // COLOR SWAP (Halfway through the spin)
      tl.call(function(){
          if(controllerModel) {
              controllerModel.traverse(function(child){ if(child.isMesh) child.material = mGrad; }); // Swap to Playful Gradient
          }
      }, null, 5.5);
      tl.call(function(){
          if(controllerModel) {
              controllerModel.traverse(function(child){ if(child.isMesh) child.material = child.userData.origMat; }); // Revert if scrolling back
          }
      }, null, 5.45);

      // HOLOGRAM REVEAL
      tl.call(function(){ video.play(); }, null, 7.0);
      tl.to(holoG.scale,{x:1,y:1,z:1,duration:2,ease:'back.out(1.3)'},7.2);
      tl.to(bMat, {opacity:.22,duration:1.8},7.2);
      tl.to(bcMat,{opacity:.48,duration:1.8},7.2);

      // HOLOGRAM ABSORBS
      tl.to(holoG.scale,  {x:.04,y:.04,z:.04,duration:1.8,ease:'power3.in'},12.5);
      tl.to(bMat,         {opacity:0,duration:1.5},12.5);
      tl.to(bcMat,        {opacity:0,duration:1.5},12.5);

      // FINAL REVEAL (Camera Wide)
      tl.to(camera.position,{z:24,y:3,duration:2.5,ease:'power2.out'},14);
      tl.to(ctrl.rotation,  {x:-.04,duration:2,ease:'power2.out'},14);

      tl.to('#bottom-ui',{opacity:1,y:0,duration:2,ease:'power2.out'},15.5);
      tl.call(function(){ document.getElementById('nav-auth').classList.add('show'); },null,15.5);

      [[0,'—'],[0.8,'PROMPT INPUT'],[4.0,'SYNCHRONISED SPIN'],[7.2,'HOLOGRAM PROJECTED'],[12.5,'WORLD ABSORBED'],[15.5,'BUILD YOUR WORLD']].forEach(function(ph){
        tl.call(function(){setLabel(ph[1]);},null,ph[0]);
      });
  }

  /* ── RENDER LOOP ── */
  var T=0;
  function animate(now){
    requestAnimationFrame(animate);
    T=now*.001;

    // Pulse Lights
    kL.intensity =9 +Math.sin(T*1.65)*1.8;
    rL.intensity =6 +Math.sin(T*1.25+1)*1.4;
    fL.intensity =3.8+Math.sin(T*2.1)*.9;

    // Joystick Float
    if(floatJoy) ctrl.position.y = -0.5+Math.sin(T*.72)*.15;

    // Beam Spin
    if(bMat.opacity>0){ bMesh.rotation.y=T*.35; bcMesh.rotation.y=-T*.6; }

    camera.lookAt(Math.sin(T*.06)*.15, lookY, 0);
    renderer.render(scene,camera);
  }
  requestAnimationFrame(animate);

  window.addEventListener('resize',function(){
    camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight);
  });
}
})();
</script>
</body>
</html>
