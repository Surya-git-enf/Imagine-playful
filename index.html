<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Playful — Turn Words Into Worlds</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
        background: #000000;
        font-family: 'Inter', sans-serif;
        color: #ffffff;
        height: 400vh; /* Gives room for scroll animations */
        overflow-x: hidden;
    }

    #webgl-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; outline: none; }

    #ui-layer {
        position: fixed; inset: 0; z-index: 10; pointer-events: none;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        perspective: 1000px;
    }

    #scroll-hint {
        position: absolute; bottom: 40px; font-family: 'Space Mono', monospace; font-size: 0.8rem;
        color: rgba(137, 207, 240, 0.8); letter-spacing: 3px; text-transform: uppercase;
        animation: pulse 2s infinite;
    }

    .top-nav {
        position: absolute; top: 30px; right: 40px; width: 100%;
        display: flex; justify-content: flex-end; pointer-events: auto;
        opacity: 0; transform: translateY(-20px);
    }
    .sign-in-btn {
        background: transparent; border: 1px solid rgba(255,255,255,0.2);
        color: white; padding: 8px 24px; border-radius: 50px;
        font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer;
        transition: all 0.3s; backdrop-filter: blur(10px);
    }
    .sign-in-btn:hover { background: rgba(255,255,255,0.1); border-color: white; }

    /* 💎 PREMIUM BABY BLUE LIQUID GLASS */
    #prompt-box {
        position: absolute; top: 12%; width: 90%; max-width: 500px;
        background: linear-gradient(135deg, rgba(137, 207, 240, 0.15) 0%, rgba(0, 0, 0, 0.6) 100%);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(137, 207, 240, 0.3); 
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(137, 207, 240, 0.1);
        border-radius: 16px; padding: 30px;
        opacity: 0; transform: translateY(20px);
    }
    #typewriter { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 400; line-height: 1.6; color: #f8fafc; }
    .cursor { display: inline-block; width: 6px; height: 1rem; background: #89CFF0; margin-left: 5px; animation: blink 1s infinite; vertical-align: text-bottom; }

    /* Final UI Reveal */
    #bottom-ui {
        position: absolute; bottom: 8%; text-align: center; width: 100%;
        opacity: 0; transform: translateY(40px); pointer-events: auto;
    }
    .logo-text { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 700; letter-spacing: -2px; margin-bottom: -5px; }
    .serif-accent {
        font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
        font-size: clamp(2rem, 4vw, 3.5rem); color: #e2e8f0; margin-bottom: 30px;
    }
    .build-btn {
        background: linear-gradient(135deg, #1e3a8a 0%, #020617 100%);
        color: white; border: 1px solid rgba(59, 130, 246, 0.3); padding: 18px 55px;
        border-radius: 50px; font-family: 'Inter', sans-serif; font-weight: 600;
        font-size: 1.1rem; cursor: pointer; transition: all 0.3s;
        box-shadow: 0 10px 30px rgba(30, 58, 138, 0.3);
    }
    .build-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(30, 58, 138, 0.5); border-color: rgba(59, 130, 246, 0.6); }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
</style>
</head>
<body>

<canvas id="webgl-canvas"></canvas>

<div id="ui-layer">
    <div id="scroll-hint">Scroll Down</div>
    <div class="top-nav"><button class="sign-in-btn">Sign In</button></div>

    <div id="prompt-box">
        <span id="typewriter"></span><span class="cursor" id="cursor"></span>
    </div>

    <div id="bottom-ui">
        <div class="logo-text">Playful</div>
        <div class="serif-accent">turns words into worlds</div>
        <button class="build-btn">Build Now</button>
    </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

// 1. THREE.JS SETUP
const canvas = document.getElementById('webgl-canvas');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.04);

// Starts close behind the joystick
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, -4); 

const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Dramatic Lighting (Starts dim)
const ambientLight = new THREE.AmbientLight(0xffffff, 0.1); scene.add(ambientLight);
const spotLight = new THREE.SpotLight(0x89CFF0, 0); 
spotLight.position.set(0, 8, -2); spotLight.angle = Math.PI / 4; spotLight.penumbra = 0.8;
scene.add(spotLight);
const frontLight = new THREE.DirectionalLight(0xffffff, 0); frontLight.position.set(0, 2, 5); scene.add(frontLight);

// 2. CONTROLLER SETUP
let controllerGroup = new THREE.Group();
scene.add(controllerGroup);
controllerGroup.position.y = -1;

const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.4 });

// Playful Gradient Material
const gradCanvas = document.createElement('canvas'); gradCanvas.width = 1024; gradCanvas.height = 1024;
const ctx = gradCanvas.getContext('2d');
const grad = ctx.createLinearGradient(0, 0, 1024, 1024);
grad.addColorStop(0, "#4f46e5"); grad.addColorStop(0.3, "#a855f7"); grad.addColorStop(0.6, "#ec4899"); grad.addColorStop(1, "#f97316");
ctx.fillStyle = grad; ctx.fillRect(0,0,1024,1024);
const gradientTex = new THREE.CanvasTexture(gradCanvas); gradientTex.flipY = false;
const gradientMat = new THREE.MeshStandardMaterial({ map: gradientTex, roughness: 0.1, metalness: 0.4, emissive: 0x4f46e5, emissiveIntensity: 0.3 });

// 3. IRON MAN HOLOGRAM BEAM
const video = document.createElement('video');
video.src = "./gemini_generated_video_36f7ddcd.mp4"; // EXACT FILE NAME
video.muted = true; video.loop = true; video.playsInline = true; video.crossOrigin = "anonymous";

const videoTex = new THREE.VideoTexture(video);
const holoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false });
const holoScreen = new THREE.Mesh(new THREE.PlaneGeometry(5.3, 3), holoMat);
holoScreen.position.set(0, 3, 0); holoScreen.scaling.set(0, 0, 0); 
controllerGroup.add(holoScreen); // Spins with controller

const beamGeo = new THREE.CylinderGeometry(2.8, 0.1, 4, 32, 1, true); 
const beamMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false });
const holoBeam = new THREE.Mesh(beamGeo, beamMat);
holoBeam.position.set(0, 1.5, 0); 
controllerGroup.add(holoBeam);

// 4. LOAD YOUR 6MB MODEL (Asynchronously - no loading screen!)
const loader = new THREE.GLTFLoader();
loader.load('./ps5_controller.glb', function(gltf) {
    const model = gltf.scene;
    model.traverse((child) => { 
        if (child.isMesh) { child.material = whiteMat; child.name = "body"; } 
    });
    model.scale.set(12, 12, 12); // Adjust if necessary
    controllerGroup.add(model);
    console.log("Model loaded successfully!");
});

// 5. MASTER SCROLL TIMELINE (Starts immediately)
function initScrollAnimation() {
    const tl = gsap.timeline({ scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 1 } });
    
    // A. Camera Pull-Back & Drama Lighting (0 to 3)
    tl.to("#scroll-hint", { opacity: 0, duration: 0.5 }, 0);
    tl.to(camera.position, { z: 12, y: 1.5, duration: 3, ease: "power2.inOut" }, 0);
    tl.to(ambientLight, { intensity: 0.4, duration: 2 }, 0.5);
    tl.to(spotLight, { intensity: 10, duration: 2 }, 0.5);
    tl.to(frontLight, { intensity: 1.5, duration: 2 }, 1);

    // B. Prompt Box Fades In & Types (2 to 5)
    tl.to("#prompt-box", { opacity: 1, y: 0, duration: 1 }, 2);
    const fullText = "Create a 3D space shooter game with first-person view. Enemies attack in waves. I use lasers.";
    const textObj = { val: 0 };
    tl.to(textObj, {
        val: fullText.length, duration: 2,
        onUpdate: () => { document.getElementById("typewriter").innerText = fullText.substring(0, Math.floor(textObj.val)); }
    }, 3);

    // C. The Sync Spin (5 to 8)
    tl.to(controllerGroup.rotation, { y: Math.PI * 2, duration: 3, ease: "power2.inOut" }, 5);
    tl.to("#prompt-box", { rotationY: 180, scale: 0, opacity: 0, duration: 1.5, ease: "power2.in" }, 5);

    // D. 90-Degree Color Swap (At 5.75s)
    tl.call(() => {
        controllerGroup.traverse((child) => { if(child.name === "body" && child.material !== gradientMat) child.material = gradientMat; });
    }, null, 5.75); 
    tl.call(() => {
        controllerGroup.traverse((child) => { if(child.name === "body" && child.material !== whiteMat) child.material = whiteMat; });
    }, null, 5.74); 

    // E. Hologram Projects (6 to 7.5)
    tl.call(() => video.play(), null, 6);
    tl.to(holoScreen.scaling, { x: 1, y: 1, z: 1, duration: 1.5, ease: "back.out(1.2)" }, 6);
    tl.to(holoMat, { opacity: 0.9, duration: 1 }, 6);
    tl.to(beamMat, { opacity: 0.25, duration: 1 }, 6); 

    // F. Hologram Immerses back down (9 to 10.5)
    tl.to(holoScreen.scaling, { x: 0, y: 0, z: 0, duration: 1.5, ease: "power2.in" }, 9);
    tl.to(holoScreen.position, { y: 0, duration: 1.5, ease: "power2.in" }, 9);
    tl.to(holoMat, { opacity: 0, duration: 1 }, 9.5);
    tl.to(beamMat, { opacity: 0, duration: 1.5, ease: "power2.in" }, 9);

    // G. Final Cinematic Zoom & UI Reveal (10.5 to 13)
    tl.to(camera.position, { y: 6, z: 16, duration: 2.5, ease: "power2.inOut" }, 10.5);
    tl.to(controllerGroup.rotation, { x: Math.PI / 4, duration: 2.5, ease: "power2.inOut" }, 10.5);
    tl.to("#bottom-ui", { opacity: 1, y: 0, duration: 1.5, ease: "power2.out" }, 11.5);
    tl.to(".top-nav", { opacity: 1, y: 0, duration: 1.5 }, 11.5);
}

// Start the animations immediately!
initScrollAnimation();

// Render Loop
const camTarget = new THREE.Vector3(0, 0, 0);
function animate() {
    requestAnimationFrame(animate);
    controllerGroup.position.y = -1 + Math.sin(Date.now() * 0.002) * 0.1;
    camera.lookAt(camTarget);
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
